{% load static %}
<link rel="stylesheet" href="{% static 'polls/style.css' %}">

<div class="container">
  <h1>🗳️ Poll Questions</h1>

  <ul>
    {% for question in questions %}
      <li>
        <a href="{% url 'detail' question.id %}">
          {{ question.question_text }}
        </a>
      </li>
    {% empty %}
      <li>No polls available.</li>
    {% endfor %}
  </ul>
</div>
